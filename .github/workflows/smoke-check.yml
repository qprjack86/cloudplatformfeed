name: Smoke Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Run static smoke checks
        run: ruby scripts/smoke_test.rb