name: Fetch Azure & M365 Blog Feeds

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-feeds-${{ github.ref }}
  cancel-in-progress: true

# FIX: Disable all permissions at the workflow level
permissions: {}

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # FIX: Grant only the permissions required for this specific job
    permissions:
      contents: write   # Required to commit and push feed updates
      id-token: write  # Recommended for secure OIDC interactions

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1
        with:
          ruby-version: '3.3'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Azure data feeds
        env:
          AZUREFEED_RUN_METRICS_PATH: ${{ runner.temp }}/azurefeed-run-metrics.json
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: python scripts/fetch_feeds.py

      - name: Fetch M365 data from DeltaPulse
        run: python scripts/fetch_m365_data.py

      - name: Guard against publish timestamp regression
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from datetime import datetime
          from pathlib import Path

          branch_name = os.environ.get("GITHUB_REF_NAME", "main")
          files = [
            Path("data/checksums.json"),
            Path("data/m365_checksums.json"),
          ]

          def parse_generated_at(raw):
            if not raw:
              return None
            return datetime.fromisoformat(raw.replace("Z", "+00:00"))

          def read_local_generated_at(path):
            payload = json.loads(path.read_text(encoding="utf-8"))
            return parse_generated_at(payload.get("generatedAt"))

          def read_remote_generated_at(branch, path):
            cmd = ["git", "show", f"origin/{branch}:{path.as_posix()}"]
            result = subprocess.run(cmd, capture_output=True, text=True, check=False)
            if result.returncode != 0:
              return None
            payload = json.loads(result.stdout)
            return parse_generated_at(payload.get("generatedAt"))

          subprocess.run(["git", "fetch", "origin", branch_name, "--quiet"], check=False)

          regressions = []
          for path in files:
            local_ts = read_local_generated_at(path)
            remote_ts = read_remote_generated_at(branch_name, path)

            if local_ts is None:
              regressions.append(f"{path}: missing local generatedAt")
              continue
            if remote_ts is None:
              print(f"::notice::{path}: no baseline on origin/{branch_name}; skipping regression check")
              continue
            if local_ts < remote_ts:
              regressions.append(
                f"{path}: local generatedAt {local_ts.isoformat()} is older than origin/{branch_name} {remote_ts.isoformat()}"
              )

          if regressions:
            for message in regressions:
              print(f"::error::{message}")
            print("::error::Publish timestamp regression detected; refusing to continue.")
            sys.exit(1)

          print("No publish timestamp regressions detected.")
          PY

      - name: Run smoke checks
        run: ruby scripts/smoke_test.rb

      - name: Commit and push changes
        id: commit_changes
        run: |
          committed=false
          commit_sha=
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feeds.json data/feed.xml data/m365_data.json data/m365_checksums.json data/checksums.json data/azure-retirements.ics data/retirements.json data/retirements.ics data/m365-retirements.ics
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            branch_name="${GITHUB_REF_NAME:-main}"
            git commit -m "Update Azure blog feeds and M365 data - $(date -u '+%Y-%m-%d %H:%M UTC')"

            # Keep transient cache updates from breaking pull --rebase in CI.
            git restore data/.m365_cache.json || true
            git pull --rebase --autostash origin "$branch_name"

            push_attempt=1
            max_attempts=3
            until git push origin "HEAD:$branch_name"; do
              if [ "$push_attempt" -ge "$max_attempts" ]; then
                echo "::error::Push failed after ${max_attempts} attempts due to concurrent updates."
                exit 1
              fi
              push_attempt=$((push_attempt + 1))
              git pull --rebase --autostash origin "$branch_name"
            done
            committed=true
            commit_sha="$(git rev-parse HEAD)"
          fi
          echo "committed=$committed" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: Publish run summary
        if: always()
        env:
          METRICS_PATH: ${{ runner.temp }}/azurefeed-run-metrics.json
          COMMITTED: ${{ steps.commit_changes.outputs.committed }}
          COMMIT_SHA: ${{ steps.commit_changes.outputs.commit_sha }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def to_text(value):
              if value is None:
                  return "n/a"
              if isinstance(value, bool):
                  return "yes" if value else "no"
              return str(value)

          metrics_path = Path(os.environ.get("METRICS_PATH", "")).expanduser()
          committed = (os.environ.get("COMMITTED", "").strip().lower() == "true")
          commit_sha = os.environ.get("COMMIT_SHA", "").strip()
          summary_file = os.environ["GITHUB_STEP_SUMMARY"]

          metrics = {}
          if metrics_path and metrics_path.exists():
              try:
                  metrics = json.loads(metrics_path.read_text(encoding="utf-8"))
              except (OSError, json.JSONDecodeError) as e:
                  print(f"::warning::Failed to read run metrics JSON: {e}")
          else:
              print(f"::warning::Run metrics file not found at {metrics_path}")

          raw_count = metrics.get("rawArticleCount")
          unique_count = metrics.get("uniqueArticleCount")
          previous_count = metrics.get("previousArticleCount")
          if isinstance(unique_count, int) and isinstance(previous_count, int):
              delta = unique_count - previous_count
              delta_text = f"{delta:+d}"
          else:
              delta_text = "n/a"

          failsafe_triggered = bool(metrics.get("failsafeTriggered"))
          failsafe_details = metrics.get("failsafeDetails")
          summary_status = metrics.get("summaryStatus")
          summary_reason = metrics.get("summaryReason")
          summary_article_count = metrics.get("summaryArticleCount")
          savill_found = metrics.get("savillVideoFound")
          published = metrics.get("published")
          generated_at = metrics.get("generatedAt")
          retirement_total = metrics.get("retirementTotalCount")
          retirement_sources = metrics.get("retirementSourceCount")
          retirement_window_counts = metrics.get("retirementWindowCounts") or {}
          window_0_3 = retirement_window_counts.get("0_3_months")
          window_3_6 = retirement_window_counts.get("3_6_months")
          window_6_9 = retirement_window_counts.get("6_9_months")
          window_9_12 = retirement_window_counts.get("9_12_months")

          if committed:
              short_sha = commit_sha[:7] if commit_sha else "unknown"
              commit_outcome = f"pushed ({short_sha})"
          else:
              commit_outcome = "no changes"
              print("::notice::No publish commit was created for this run.")

          if failsafe_triggered:
              print("::warning::Publish fail-safe triggered; existing feed data was preserved.")

          lines = [
              "## Fetch Run Summary",
              "",
              f"- Generated at: `{to_text(generated_at)}`",
              f"- Published outputs: **{to_text(published)}**",
              f"- Commit outcome: **{commit_outcome}**",
              "",
              "### Feed Volume",
              f"- Raw articles fetched: **{to_text(raw_count)}**",
              f"- Unique articles kept: **{to_text(unique_count)}**",
              f"- Previous article count: **{to_text(previous_count)}**",
              f"- Delta vs previous: **{delta_text}**",
              "",
              "### Quality Gates",
              f"- Fail-safe triggered: **{to_text(failsafe_triggered)}**",
              f"- Fail-safe details: `{to_text(failsafe_details)}`",
              "",
              "### AI Summary",
              f"- Status: **{to_text(summary_status)}**",
              f"- Reason: `{to_text(summary_reason)}`",
              f"- Article count: **{to_text(summary_article_count)}**",
              "",
                "### Retirement Coverage",
                f"- Future retirement events: **{to_text(retirement_total)}**",
                f"- Distinct retirement sources: **{to_text(retirement_sources)}**",
                f"- 0-3 months: **{to_text(window_0_3)}**",
                f"- 3-6 months: **{to_text(window_3_6)}**",
                f"- 6-9 months: **{to_text(window_6_9)}**",
                f"- 9-12 months: **{to_text(window_9_12)}**",
                "",
              "### Extras",
              f"- Savill video found: **{to_text(savill_found)}**",
              f"- Metrics artifact path: `{metrics_path}`",
          ]

          with open(summary_file, "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Upload run metrics artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: azurefeed-run-metrics
          path: ${{ runner.temp }}/azurefeed-run-metrics.json
          if-no-files-found: warn
          retention-days: 14